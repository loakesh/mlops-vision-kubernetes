apiVersion: apps/v1
kind: Deployment
metadata:
  name: cv-pipeline-api
  labels:
    app: cv-pipeline-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cv-pipeline-api
  template:
    metadata:
      labels:
        app: cv-pipeline-api
    spec:
      serviceAccountName: cv-pipeline-sa
      containers:
      - name: api
        # Replace <AWS_ACCOUNT_ID> and <REGION> when pushing to ECR
        image: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/cv-pipeline:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: S3_BUCKET
          value: "mlops-cv-artifacts-bucket"
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
